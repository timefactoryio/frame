<style>
	.app {
		width: 100%;
		height: 100%;
		display: block;
	}
	.app iframe {
		width: 100%;
		height: 100%;
		border: 0;
		display: block;
		background: #0b0b0b;
	}
</style>

<div class="app">
	<iframe
		src="{{.URL}}"
		title="{{.TITLE}}"
		referrerpolicy="no-referrer"
		allow="
			clipboard-read;
			clipboard-write;
			fullscreen;
			autoplay;
			encrypted-media;
			picture-in-picture;
		"
		allowfullscreen></iframe>
</div>
