<style>
	.app {
		flex: 1;
		min-width: 0;
		min-height: 0;
		align-self: stretch;
	}
	.app iframe {
		width: 100%;
		height: 100%;
		border: 0;
		display: block;
	}
</style>

<div class="app">
	<iframe
		src="{{.URL}}"
		title="{{.TITLE}}"
		referrerpolicy="no-referrer"
		allow="
			clipboard-read;
			clipboard-write;
			fullscreen;
			autoplay;
			encrypted-media;
			picture-in-picture;
			publickey-credentials-get;
			publickey-credentials-create;
		"
		allowfullscreen></iframe>
</div>
