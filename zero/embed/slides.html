<style>
	.slides {
		display: flex;
		align-items: center;
		justify-content: center;
		width: 100%;
		height: 100%;
		overflow: hidden;
	}
	.slides img {
		max-width: 95%;
		max-height: 95%;
		object-fit: contain;
	}
</style>

<img src="" alt="" />

<script>
	(function () {
		const prefix = '{{.PREFIX}}';
		const img = space().querySelector('img');
		let slides = [];
		let index = pathless.read()[prefix] || 0;

		function unpack(buf) {
			const view = new DataView(buf);
			const manifestLen = view.getUint32(0);
			const manifest = JSON.parse(
				new TextDecoder().decode(new Uint8Array(buf, 4, manifestLen)),
			);
			let offset = 4 + manifestLen;
			return manifest.map((e) => {
				const blob = new Blob([new Uint8Array(buf, offset, e.Size)], {
					type: e.Type,
				});
				offset += e.Size;
				return { Name: e.Name, url: URL.createObjectURL(blob) };
			});
		}

		function show(i) {
			if (!slides.length) return;
			index = ((i % slides.length) + slides.length) % slides.length;
			pathless.write(prefix, index);
			img.src = slides[index].url;
			img.alt = slides[index].Name;
		}

		pathless.fetch(`${window.apiUrl}/${prefix}`).then((buf) => {
			slides = unpack(buf);
			if (slides.length) show(index);
		});

		onKey('a', () => show(index - 1), { desc: '←' });
		onKey('d', () => show(index + 1), { desc: '→' });
	})();
</script>
